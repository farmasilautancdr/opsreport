<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>OPS PORTAL V4.2.8</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#075985">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --ocean: #075985; --aqua: #2dd4bf; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; -webkit-tap-highlight-color: transparent; padding-bottom: env(safe-area-inset-bottom); }
        .ocean-gradient { background: linear-gradient(135deg, #075985 0%, #0c4a6e 100%); }
        .glass-card { background: rgba(255, 255, 255, 0.98); backdrop-filter: blur(10px); border: 1px solid #bae6fd; }
        #admin-overlay { display: none; position: fixed; inset: 0; background: #f8fafc; z-index: 9999; flex-direction: column; overflow-y: auto; }
        .sticky-header { position: sticky; top: 0; background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(15px); z-index: 100; padding: 20px; border-bottom: 1px solid #e2e8f0; }
        
        /* InstaReport Deep-Scan Styles */
        .submission-card { transition: all 0.3s ease; }
        .collapsible-body { max-height: 0; overflow: hidden; transition: max-height 0.4s ease-out, opacity 0.3s; opacity: 0; }
        .submission-card.open .collapsible-body { max-height: 10000px; opacity: 1; }
        .chevron-icon { transition: transform 0.3s ease; }
        .submission-card.open .chevron-icon { transform: rotate(180deg); }
        .detail-line { border-left: 2px solid #e2e8f0; padding-left: 12px; margin-left: 8px; margin-bottom: 20px; }
        
        #bulkBar { position: fixed; bottom: 0; left: 0; right: 0; background: var(--ocean); color: white; padding: 20px; z-index: 10000; border-radius: 24px 24px 0 0; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 -10px 25px rgba(0,0,0,0.1); }

        #image-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 10001; align-items: center; justify-content: center; padding: 20px; }
        #image-modal img { max-width: 100%; max-height: 80vh; border-radius: 15px; box-shadow: 0 0 30px rgba(0,0,0,0.5); }
        
        .photo-card { background: #ffffff; border: 1px solid #e2e8f0; border-radius: 28px; padding: 18px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .photo-upload-zone { width: 100%; height: 230px; border: 2px dashed #cbd5e1; border-radius: 22px; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; overflow: hidden; background: #f1f5f9; cursor: pointer; }
        .photo-upload-zone img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 10; border-radius: 20px; }
        .timestamp-badge { position: absolute; bottom: 0; left: 0; width: 100%; background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, transparent 100%); color: white; font-size: 10px; padding: 25px 12px 10px 12px; z-index: 20; font-weight: 600; pointer-events: none; }
        .clear-btn { position: absolute; top: 12px; right: 12px; z-index: 30; background: #ef4444; color: white; padding: 6px 14px; border-radius: 12px; font-size: 10px; font-weight: 800; text-transform: uppercase; }
        #loading-overlay { display: none; position: fixed; inset: 0; background: rgba(7, 89, 133, 0.98); backdrop-filter: blur(10px); z-index: 10000; flex-direction: column; align-items: center; justify-content: center; color: white; }
        .spinner { width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.2); border-radius: 50%; border-top-color: var(--aqua); animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <canvas id="compressCanvas" class="hidden"></canvas>

    <div id="image-modal" onclick="this.style.display='none'">
        <div class="flex flex-col items-center"><img id="modal-img" src=""><p class="text-white mt-4 text-xs font-bold uppercase tracking-widest text-center px-4 leading-relaxed">Tap to close</p></div>
    </div>

    <div id="loading-overlay">
        <div class="spinner mb-4"></div>
        <h2 id="loading-text" class="text-lg font-bold uppercase tracking-widest text-center px-6">Syncing Data...</h2>
    </div>

    <div id="success-overlay" class="hidden fixed inset-0 bg-white z-[10001] flex flex-col items-center justify-center text-center p-6">
        <div class="w-20 h-20 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center text-4xl mb-6 shadow-inner"><i class="fas fa-check"></i></div>
        <h2 class="text-2xl font-800 uppercase tracking-widest text-slate-800">Success</h2>
        <button onclick="clearAllAndReload()" class="mt-10 px-12 py-4 bg-sky-900 text-white rounded-2xl font-black uppercase text-xs shadow-xl active:scale-95">New Report</button>
    </div>

    <div id="admin-overlay">
        <div class="sticky-header">
            <div class="flex justify-between items-center mb-6">
                <div>
                    <h2 class="text-2xl font-800 text-sky-900 tracking-tighter uppercase">Supervisor</h2>
                    <p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest mt-1">Master Database Feed</p>
                </div>
                <button onclick="closeAdmin()" class="w-12 h-12 rounded-2xl bg-red-50 text-red-500 flex items-center justify-center text-lg active:scale-90 shadow-sm"><i class="fas fa-times"></i></button>
            </div>
            <div class="space-y-3">
                <div class="grid grid-cols-2 gap-3">
                    <select id="filter-role" onchange="renderAdminLogs()" class="w-full p-4 rounded-2xl bg-white border border-slate-100 text-xs font-black shadow-sm outline-none">
                        <option value="ALL">All Portal Roles</option>
                        <option value="DRIVER">Driver</option>
                        <option value="OUTLET">Outlet</option>
                    </select>
                    <select id="filter-outlet" onchange="renderAdminLogs()" class="w-full p-4 rounded-2xl bg-white border border-slate-100 text-xs font-black shadow-sm outline-none"></select>
                </div>
                <input type="month" id="filter-date" onchange="renderAdminLogs()" class="w-full p-4 rounded-2xl bg-white border border-slate-100 text-xs font-black shadow-sm">
            </div>
        </div>
        
        <div id="admin-log-container" class="p-6 space-y-6 pb-40"></div>

        <div id="bulkBar" class="hidden">
            <div class="flex items-center gap-3">
                <input type="checkbox" id="selectAll" onchange="toggleSelectAll()" class="w-6 h-6 rounded-xl accent-white">
                <span id="selectedText" class="text-xs font-black uppercase tracking-widest">0 Selected</span>
            </div>
            <button onclick="downloadBulk()" class="bg-white text-sky-900 px-6 py-3 rounded-2xl font-black text-[10px] uppercase shadow-lg">Combined PDF</button>
        </div>
    </div>

    <header class="ocean-gradient text-white pt-16 pb-24 px-8 rounded-b-[50px] shadow-2xl relative z-0 text-center">
        <div class="absolute top-6 right-8 text-[10px] font-black text-sky-300 opacity-80 bg-sky-950/30 px-3 py-1 rounded-full border border-sky-400/20">V4.2.8</div>
        <h1 class="text-3xl font-800 tracking-tighter uppercase">Ops Portal</h1>
        <p class="text-sky-100 text-[9px] font-bold tracking-[0.2em] opacity-90 uppercase mt-1">Driver & Outlet System</p>
    </header>

    <main class="px-5 -mt-16 pb-10 relative z-10">
        <section id="step-1" class="glass-card rounded-[40px] p-8 shadow-2xl border-none">
            <div class="space-y-8">
                <div>
                    <label class="text-[10px] font-900 text-sky-900/40 uppercase mb-4 block tracking-[0.2em] text-center uppercase">Identity Selection</label>
                    <div class="grid grid-cols-2 gap-4">
                        <button id="role-driver" onclick="selectRole('DRIVER')" class="py-6 border-2 border-slate-100 rounded-3xl font-black text-slate-400 bg-white transition-all uppercase">Driver</button>
                        <button id="role-outlet" onclick="selectRole('OUTLET')" class="py-6 border-2 border-slate-100 rounded-3xl font-black text-slate-400 bg-white transition-all uppercase">Outlet</button>
                    </div>
                </div>
                <div class="space-y-4">
                    <input type="text" id="user-name" oninput="saveDraft()" placeholder="Enter Full Name" class="w-full p-5 rounded-3xl border border-slate-100 outline-none focus:ring-4 focus:ring-sky-50 bg-white font-bold text-slate-800">
                    <select id="outlet-select" onchange="saveDraft()" class="w-full p-5 rounded-3xl border border-slate-100 bg-white outline-none font-bold text-slate-800 appearance-none"></select>
                    <input type="date" id="entry-date" oninput="saveDraft()" class="w-full p-5 rounded-3xl border border-slate-100 bg-white outline-none font-bold text-slate-800">
                </div>
                <button onclick="openPortal()" class="w-full ocean-gradient text-white font-black py-6 rounded-[2rem] shadow-2xl shadow-sky-900/20 uppercase tracking-widest text-sm active:scale-95 transition-all">Login</button>
            </div>
        </section>

        <section id="step-2" class="hidden space-y-6 mt-4">
            <div class="flex items-center gap-3 bg-white/50 p-2 rounded-2xl backdrop-blur-sm shadow-inner">
                <button onclick="goBack()" class="bg-white px-6 py-3 rounded-xl shadow-md text-sky-900 font-black text-[11px] flex items-center border border-sky-100 active:scale-90 uppercase">BACK</button>
                <div class="flex-1 text-right mr-4"><span id="portal-display-title" class="text-sky-900 font-900 text-[10px] uppercase tracking-widest"></span></div>
            </div>
            <div id="photo-grid" class="space-y-6">
                <script>
                    for(let i=1; i<=12; i++) {
                        document.write(`
                            <div class="photo-card space-y-4">
                                <div class="flex justify-between items-center px-1">
                                    <span class="text-[11px] font-black text-slate-400 uppercase tracking-widest">Evidence Slot ${i}</span>
                                    <div class="w-8 h-8 rounded-full bg-sky-50 flex items-center justify-center text-sky-400 text-xs shadow-inner"><i class="fas fa-camera"></i></div>
                                </div>
                                <div class="photo-upload-zone" onclick="triggerCamera(${i})">
                                    <div class="text-center" id="placeholder-${i}"><div class="text-3xl mb-1">📸</div><div class="text-[9px] font-900 text-sky-500 uppercase tracking-widest">Snap Capture</div></div>
                                    <input type="file" id="cam-${i}" accept="image/*" capture="camera" class="hidden" onchange="handleImmediateStamping(this, ${i})">
                                    <div id="wrap-${i}" class="absolute inset-0 pointer-events-none"></div>
                                </div>
                                <textarea id="desc-${i}" oninput="saveDraft()" class="w-full p-5 rounded-2xl border border-slate-50 bg-slate-50 text-sm font-semibold text-slate-700 outline-none focus:ring-4 focus:ring-sky-100/50" placeholder="..."></textarea>
                            </div>
                        `);
                    }
                </script>
            </div>
            <button id="submit-btn" disabled onclick="processAllPortals()" class="w-full bg-slate-900 text-white font-black py-7 rounded-[2.5rem] shadow-2xl uppercase tracking-[0.4em] mt-8 mb-20 active:scale-95 transition-all">Submit Report</button>
        </section>
    </main>

    <div class="fixed bottom-4 right-4 z-[1000]"><button onclick="promptAdmin()" class="bg-white/90 backdrop-blur-md p-4 rounded-full text-[10px] font-black text-sky-900 shadow-2xl uppercase border border-sky-100 active:scale-95 transition-all shadow-sky-200">Supervisor</button></div>

    <script>
        const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbwy58cuAW4o6ZMuvH98TWoBwnSFfxppFG-eg6kbZvzM1I9fNYHlejK6WVFj79fZwY1r5w/exec';
        const outlets = ["AJ", "B6", "BB", "BJR", "BP", "CDR", "CK", "DG", "DGD", "GB", "GBD", "GM", "HL", "HQ", "HQCT", "JL", "JLD", "JTH", "KB", "KBKK", "KBKS", "KBTJ", "KKR", "KL", "KMD", "KMN", "KMSK", "KS", "MC", "MLR", "MR", "PC", "PK", "PM", "PP", "PPK", "PSPD", "PT", "RJ", "SLS", "SMR", "ST", "TM", "TMD", "TMT", "TPOH", "TPT", "WM"];
        let currentRole = "";
        let globalDatabase = [];

        const sel = document.getElementById('outlet-select');
        const adminSel = document.getElementById('filter-outlet');
        sel.innerHTML = outlets.map(o => `<option value="${o}">${o}</option>`).join('');
        adminSel.innerHTML = `<option value="ALL">All Outlets</option>` + outlets.map(o => `<option value="${o}">${o}</option>`).join('');
        document.getElementById('entry-date').valueAsDate = new Date();
        document.getElementById('filter-date').value = new Date().toISOString().slice(0, 7);

        window.onload = () => {
            const draft = JSON.parse(localStorage.getItem('ops_portal_draft'));
            if(draft) {
                document.getElementById('user-name').value = draft.user || "";
                document.getElementById('outlet-select').value = draft.outlet || "AJ";
                document.getElementById('entry-date').value = draft.date || new Date().toISOString().split('T')[0];
                if(draft.role) selectRole(draft.role);
                for(let i=1; i<=12; i++) {
                    if(draft.descriptions?.[i-1]) document.getElementById(`desc-${i}`).value = draft.descriptions[i-1];
                    const savedImg = localStorage.getItem(`photo_data_${i}`);
                    if(savedImg) displayStoredPhoto(i, savedImg, `Point Secured`);
                }
                validateSubmit();
            }
        };

        function selectRole(role) {
            currentRole = role;
            const isDriver = role === 'DRIVER';
            document.getElementById('role-driver').className = isDriver ? 'py-6 border-2 border-sky-500 rounded-3xl font-black text-sky-600 bg-sky-50 shadow-inner' : 'py-6 border-2 border-slate-100 rounded-3xl font-black text-slate-400 bg-white';
            document.getElementById('role-outlet').className = !isDriver ? 'py-6 border-2 border-sky-500 rounded-3xl font-black text-sky-600 bg-sky-50 shadow-inner' : 'py-6 border-2 border-slate-100 rounded-3xl font-black text-slate-400 bg-white';
            const ph = isDriver ? "LOKASI / DUIT TUKAR / LAIN-LAIN REPORT" : "DUIT TUKAR / ACCURACY / LAIN-LAIN REPORT";
            for(let i=1; i<=12; i++) {
                const area = document.getElementById(`desc-${i}`);
                area.placeholder = ph;
                area.value = "";
            }
            saveDraft();
        }

        function saveDraft() {
            const descs = [];
            for(let i=1; i<=12; i++) descs.push(document.getElementById(`desc-${i}`).value);
            const draft = { user: document.getElementById('user-name').value, role: currentRole, outlet: document.getElementById('outlet-select').value, date: document.getElementById('entry-date').value, descriptions: descs };
            localStorage.setItem('ops_portal_draft', JSON.stringify(draft));
        }

        function triggerCamera(id) { 
            const input = document.getElementById(`cam-${id}`);
            input.value = null;
            input.click(); 
        }

        // --- 1. IMMEDIATE STAMP LOGIC: Stamps instantly on capture ---
        function handleImmediateStamping(input, id) {
            if (!input.files || !input.files[0]) return;
            const file = input.files[0];
            const reader = new FileReader();

            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.getElementById('compressCanvas'), ctx = canvas.getContext('2d');
                    const MAX_WIDTH = 1200;
                    const scale = MAX_WIDTH / img.width;
                    canvas.width = MAX_WIDTH; canvas.height = img.height * scale;
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    
                    ctx.fillStyle = "rgba(0,0,0,0.65)";
                    ctx.fillRect(0, canvas.height - 85, canvas.width, 85);
                    ctx.fillStyle = "white";
                    ctx.font = "bold 22px Arial";
                    
                    const outlet = document.getElementById('outlet-select').value;
                    const name = document.getElementById('user-name').value.toUpperCase();
                    const time = new Date().toLocaleString('en-GB', { hour12: true }).toUpperCase();
                    
                    // Watermark: OUTLET - NAME - PORTAL - TIME & DATE
                    const stampText = `${outlet} - ${name} - ${currentRole} - ${time}`;
                    ctx.fillText(stampText, 30, canvas.height - 35);
                    
                    const finalB64 = canvas.toDataURL('image/jpeg', 0.8);
                    localStorage.setItem(`photo_data_${id}`, finalB64);
                    displayStoredPhoto(id, finalB64, `Success Stamped`);
                    saveDraft();
                    validateSubmit();
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        function displayStoredPhoto(id, base64, meta) {
            const wrap = document.getElementById(`wrap-${id}`);
            const placeholder = document.getElementById(`placeholder-${id}`);
            if(placeholder) placeholder.classList.add('hidden');
            wrap.innerHTML = `<button class="clear-btn pointer-events-auto" onclick="clearPhoto(${id}); event.stopPropagation();">Clear</button><img src="${base64}" style="width:100%; height:100%; object-fit:cover; border-radius:20px; pointer-events: none;"><div class="timestamp-badge">${meta}</div>`;
        }

        function clearPhoto(id) {
            localStorage.removeItem(`photo_data_${id}`);
            document.getElementById(`cam-${id}`).value = null;
            document.getElementById(`wrap-${id}`).innerHTML = "";
            document.getElementById(`placeholder-${id}`).classList.remove('hidden');
            saveDraft();
            validateSubmit();
        }

        function validateSubmit() {
            let count = 0;
            for(let i=1; i<=12; i++) if(localStorage.getItem(`photo_data_${i}`)) count++;
            document.getElementById('submit-btn').disabled = count < 1;
            document.getElementById('submit-btn').classList.toggle('bg-sky-50', count < 1);
            document.getElementById('submit-btn').classList.toggle('bg-slate-900', count >= 1);
        }

        function openPortal() { 
            if(!document.getElementById('user-name').value || !currentRole) return alert("Verify Identity.");
            document.getElementById('step-1').classList.add('hidden'); 
            document.getElementById('step-2').classList.remove('hidden'); 
            document.getElementById('portal-display-title').innerText = currentRole + " MODE"; 
        }

        function goBack() { document.getElementById('step-2').classList.add('hidden'); document.getElementById('step-1').classList.remove('hidden'); }
        function clearAllAndReload() { localStorage.removeItem('ops_portal_draft'); for(let i=1; i<=12; i++) localStorage.removeItem(`photo_data_${i}`); location.reload(); }

        // --- 2. SMART ARRANGEMENT Logic: Compacts gaps (1,3,6 -> 1,2,3) ---
        async function processAllPortals() {
            const overlay = document.getElementById('loading-overlay');
            overlay.style.display = 'flex';
            
            const activeSnaps = [];
            for (let i = 1; i <= 12; i++) {
                const b64 = localStorage.getItem(`photo_data_${i}`);
                if (b64) {
                    activeSnaps.push({
                        base64: b64,
                        description: document.getElementById(`desc-${i}`).value || "Verified"
                    });
                }
            }

            const photosPayload = [];
            for (let i = 0; i < 12; i++) {
                if (activeSnaps[i]) {
                    photosPayload.push(activeSnaps[i]);
                } else {
                    photosPayload.push({ base64: "", description: "" });
                }
            }

            try {
                const payload = { 
                    user: document.getElementById('user-name').value, 
                    role: currentRole, 
                    outlet: document.getElementById('outlet-select').value, 
                    date: document.getElementById('entry-date').value, 
                    photos: photosPayload 
                };

                await fetch(WEB_APP_URL, { method: 'POST', body: JSON.stringify(payload), mode: 'no-cors' });
                setTimeout(() => { overlay.style.display = 'none'; document.getElementById('success-overlay').classList.remove('hidden'); }, 1500);
            } catch (e) { alert("Sync Error."); overlay.style.display = 'none'; }
        }

        // --- 3. SUPERVISOR LOGIC (INSTAREPORT STYLE) ---
        async function fetchCloudData() {
            const container = document.getElementById('admin-log-container');
            container.innerHTML = `<div class="text-center py-20 font-black text-sky-900 animate-pulse uppercase tracking-widest text-xs">Syncing Master Feed...</div>`;
            try {
                const r = await fetch(WEB_APP_URL + "?action=fetchData");
                const d = await r.json();
                globalDatabase = d.history || [];
                renderAdminLogs();
            } catch (e) { container.innerHTML = `<div class="text-center py-20 text-red-500 font-black text-xs uppercase tracking-widest">Handshake Failed</div>`; }
        }

        function renderAdminLogs() {
            const container = document.getElementById('admin-log-container');
            container.innerHTML = "";
            const roleFilter = document.getElementById('filter-role').value;
            const outletFilter = document.getElementById('filter-outlet').value;
            const dateFilter = document.getElementById('filter-date').value;

            const filtered = globalDatabase.filter(row => {
                const matchRole = roleFilter === "ALL" || row[4].toUpperCase() === roleFilter.toUpperCase(); 
                const matchOutlet = outletFilter === "ALL" || row[2] === outletFilter;
                const matchDate = !dateFilter || row[0].toString().startsWith(dateFilter);
                return matchRole && matchOutlet && matchDate;
            });

            if(filtered.length === 0) {
                container.innerHTML = `<div class="text-center py-24 opacity-20 font-black text-xs uppercase tracking-widest">No Database Records Found</div>`;
                return;
            }

            filtered.reverse().forEach((row, index) => {
                const realRowIdx = filtered.length - index;
                const photos = row[5] || [];
                const card = document.createElement('div');
                card.id = `card_${realRowIdx}`;
                card.className = "submission-card bg-white p-6 rounded-[2.5rem] border border-slate-200 shadow-sm relative mb-4 overflow-hidden";
                
                // DEEP-SCAN COLLAPSIBLE HTML
                let galleryHtml = photos.length > 0 ? `
                    <div class="collapsible-body space-y-6 mt-6 pt-6 border-t border-slate-50">
                        ${photos.map((p, pIdx) => `
                            <div class="detail-line">
                                <div class="flex items-center gap-2 mb-3">
                                    <div class="w-2 h-2 rounded-full bg-sky-500"></div>
                                    <span class="text-[9px] font-black text-slate-700 uppercase tracking-tight">Point ${pIdx+1}: ${p.description}</span>
                                </div>
                                <div class="h-48 w-full rounded-2xl overflow-hidden border bg-slate-50">
                                    <img src="${p.base64}" class="w-full h-full object-cover" onclick="openModalImage('${p.base64}')">
                                </div>
                            </div>
                        `).join('')}
                        <div class="grid grid-cols-2 gap-3 mt-6">
                            <button onclick="window.open('${WEB_APP_URL}?action=getReport&role=${row[4]}&row=${realRowIdx}', '_blank')" class="py-4 bg-slate-50 text-slate-500 rounded-2xl text-[10px] font-black uppercase">Preview</button>
                            <button onclick="downloadIndividualPDF('${row[4]}', ${realRowIdx})" class="py-4 bg-sky-100 text-sky-900 rounded-2xl text-[10px] font-black uppercase">Save PDF</button>
                        </div>
                    </div>
                ` : `<div class="collapsible-body text-center text-slate-300 py-8 text-[10px] italic">No Evidence Uploaded</div>`;

                card.innerHTML = `
                    <div class="flex justify-between items-center" onclick="toggleCard(${realRowIdx})">
                        <div class="flex items-center gap-4">
                            <input type="checkbox" value="${realRowIdx}|${row[4]}" class="report-checkbox w-6 h-6 rounded-xl border-slate-300 accent-sky-900" onclick="event.stopPropagation()">
                            <div>
                                <h4 class="font-black text-sm uppercase text-slate-800">${row[1]}</h4>
                                <p class="text-[9px] font-black text-sky-500 mt-0.5 uppercase tracking-tighter">${row[2]} • ${row[4]} • ${row[3]}</p>
                            </div>
                        </div>
                        <i class="fas fa-chevron-down text-slate-300 chevron-icon"></i>
                    </div>
                    ${galleryHtml}
                `;
                container.appendChild(card);
            });
            updateSelectedCount();
        }

        function toggleCard(id) {
            document.getElementById(`card_${id}`).classList.toggle('open');
        }

        function toggleSelectAll() {
            const master = document.getElementById('selectAll').checked;
            document.querySelectorAll('.report-checkbox').forEach(cb => cb.checked = master);
            updateSelectedCount();
        }

        function updateSelectedCount() {
            const checked = document.querySelectorAll('.report-checkbox:checked').length;
            document.getElementById('bulkBar').classList.toggle('hidden', checked === 0);
            document.getElementById('selectedText').innerText = `${checked} Selected`;
        }

        async function downloadIndividualPDF(role, rowId) {
            const overlay = document.getElementById('loading-overlay');
            overlay.style.display = 'flex';
            overlay.querySelector('h2').innerText = "Building PDF...";
            try {
                // InstaReport Style: Pass Role + RowId
                const resp = await fetch(`${WEB_APP_URL}?action=generatePDF&role=${role}&row=${rowId}`);
                const result = await resp.json();
                const binaryString = atob(result.data);
                const bytes = new Uint8Array(binaryString.length);
                for (let i = 0; i < binaryString.length; i++) bytes[i] = binaryString.charCodeAt(i);
                const blob = new Blob([bytes], {type: 'application/pdf'});
                const link = document.createElement('a');
                link.href = window.URL.createObjectURL(blob);
                link.download = `Log_${role}_#${rowId}.pdf`;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            } catch (e) { window.open(`${WEB_APP_URL}?action=getReport&role=${role}&row=${rowId}`, '_blank'); } 
            finally { overlay.style.display = 'none'; overlay.querySelector('h2').innerText = "Syncing Database..."; }
        }

        async function downloadBulk() {
            const selected = Array.from(document.querySelectorAll('.report-checkbox:checked')).map(cb => cb.value);
            if(selected.length === 0) return alert("Select records.");
            window.open(`${WEB_APP_URL}?action=combinedPDF&ids=${selected.join(',')}`, '_blank');
        }

        function openModalImage(src) {
            const modal = document.getElementById('image-modal');
            const img = document.getElementById('modal-img');
            img.src = src;
            modal.style.display = 'flex';
        }

        function promptAdmin() {
            if(prompt("System Access PIN:") === "admin") { 
                document.getElementById('admin-overlay').style.display = 'flex'; 
                fetchCloudData(); 
            } else alert("Denied.");
        }
        function closeAdmin() { document.getElementById('admin-overlay').style.display = 'none'; }
    </script>
</body>
</html>
