<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>OPS PORTAL V2.9.1</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --ocean: #075985; --aqua: #2dd4bf; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; -webkit-tap-highlight-color: transparent; padding-bottom: env(safe-area-inset-bottom); }
        .ocean-gradient { background: linear-gradient(135deg, #075985 0%, #0c4a6e 100%); }
        .glass-card { background: rgba(255, 255, 255, 0.98); backdrop-filter: blur(10px); border: 1px solid #bae6fd; }
        
        /* SUPERVISOR DASHBOARD UI V2.9.1 */
        #admin-overlay { 
            display: none; 
            position: fixed; 
            inset: 0; 
            background: #f8fafc; 
            z-index: 9999; /* Highest priority */
            flex-direction: column;
            overflow-y: auto;
        }
        .sticky-header {
            position: sticky;
            top: 0;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(15px);
            z-index: 100;
            padding: 24px;
            border-bottom: 1px solid #e2e8f0;
        }
        .admin-slider { display: flex; overflow-x: auto; gap: 14px; padding: 10px 0; scroll-snap-type: x mandatory; scrollbar-width: none; }
        .admin-slider::-webkit-scrollbar { display: none; }
        .slider-item { flex: 0 0 85%; scroll-snap-align: center; background: white; border-radius: 24px; border: 1px solid #e2e8f0; overflow: hidden; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .slider-item img { width: 100%; height: 190px; object-fit: cover; }
        .slider-desc { padding: 12px 16px; font-size: 11px; color: #334155; font-weight: 600; line-height: 1.5; background: #fff; }
        
        /* PORTAL ELEMENTS */
        .photo-card { background: #ffffff; border: 1px solid #e2e8f0; border-radius: 28px; padding: 18px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .photo-upload-zone { width: 100%; height: 220px; border: 2px dashed #cbd5e1; border-radius: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; overflow: hidden; background: #f1f5f9; cursor: pointer; }
        .photo-upload-zone img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 10; }
        .timestamp-badge { position: absolute; bottom: 0; left: 0; width: 100%; background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, transparent 100%); color: white; font-size: 10px; padding: 25px 12px 10px 12px; z-index: 20; font-weight: 600; pointer-events: none; }
        #loading-overlay, #success-overlay { display: none; position: fixed; inset: 0; background: rgba(7, 89, 133, 0.98); backdrop-filter: blur(10px); z-index: 10000; flex-direction: column; align-items: center; justify-content: center; color: white; }
        .spinner { width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.2); border-radius: 50%; border-top-color: var(--aqua); animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loading-overlay">
        <div class="spinner mb-4"></div>
        <h2 id="loading-text" class="text-lg font-bold uppercase tracking-widest">Processing...</h2>
    </div>

    <div id="success-overlay" style="background: white; color: #1e293b;">
        <div class="w-20 h-20 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center text-4xl mb-6"><i class="fas fa-check"></i></div>
        <h2 class="text-2xl font-800 uppercase tracking-widest">Report Synced</h2>
        <button onclick="clearAllAndReload()" class="mt-10 px-12 py-4 bg-sky-900 text-white rounded-2xl font-black uppercase text-xs shadow-xl active:scale-95 transition-all">New Entry</button>
    </div>

    <div id="admin-overlay">
        <div class="sticky-header">
            <div class="flex justify-between items-center mb-6">
                <div>
                    <h2 class="text-2xl font-800 text-sky-900 tracking-tighter">Supervisor Feed</h2>
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Real-time Portal Monitoring</p>
                </div>
                <button onclick="closeAdmin()" class="w-12 h-12 rounded-2xl bg-red-50 text-red-500 flex items-center justify-center text-lg shadow-sm active:scale-90 transition-all"><i class="fas fa-times"></i></button>
            </div>
            
            <div class="space-y-3">
                <div class="grid grid-cols-2 gap-3">
                    <div class="relative">
                        <select id="filter-role" onchange="renderAdminLogs()" class="w-full p-4 pl-10 rounded-2xl bg-white border border-slate-200 text-xs font-black outline-none shadow-sm appearance-none">
                            <option value="ALL">All Roles</option>
                            <option value="DRIVER">Driver</option>
                            <option value="OUTLET">Outlet</option>
                        </select>
                        <i class="fas fa-user-tag absolute left-4 top-4.5 text-slate-300 text-xs"></i>
                    </div>
                    <div class="relative">
                        <select id="filter-outlet" onchange="renderAdminLogs()" class="w-full p-4 pl-10 rounded-2xl bg-white border border-slate-200 text-xs font-black outline-none shadow-sm appearance-none"></select>
                        <i class="fas fa-store absolute left-4 top-4.5 text-slate-300 text-xs"></i>
                    </div>
                </div>
                <div class="grid grid-cols-5 gap-3">
                    <div class="col-span-3 relative">
                        <input type="month" id="filter-date" onchange="renderAdminLogs()" class="w-full p-4 pl-10 rounded-2xl bg-white border border-slate-200 text-xs font-black outline-none shadow-sm">
                        <i class="fas fa-calendar absolute left-4 top-4.5 text-slate-300 text-xs"></i>
                    </div>
                    <button onclick="downloadBulk()" class="col-span-2 bg-sky-900 text-white rounded-2xl flex items-center justify-center text-[10px] font-black uppercase tracking-widest shadow-lg active:scale-95 transition-all">
                        <i class="fas fa-file-export mr-2"></i> Bulk PDF
                    </button>
                </div>
            </div>
        </div>

        <div id="admin-log-container" class="p-6 space-y-8 pb-32">
            </div>
    </div>

    <header class="ocean-gradient text-white pt-16 pb-24 px-8 rounded-b-[50px] shadow-2xl relative z-0">
        <div class="absolute top-6 right-8 text-[10px] font-black text-sky-300 opacity-80 bg-sky-950/30 px-3 py-1 rounded-full border border-sky-400/20">V2.9.1</div>
        <div class="flex flex-col items-center">
            <h1 class="text-3xl font-800 text-center tracking-tighter uppercase">Ops Portal</h1>
            <p class="text-center text-sky-200 text-[10px] font-bold tracking-[0.2em] opacity-80 uppercase mt-1">Verification System</p>
        </div>
    </header>

    <main class="px-5 -mt-16 pb-20 relative z-10">
        <section id="step-1" class="glass-card rounded-[40px] p-8 shadow-2xl border-none">
            <div class="space-y-8">
                <div>
                    <label class="text-[10px] font-900 text-sky-900/40 uppercase mb-4 block tracking-[0.2em] text-center">Select Category</label>
                    <div class="grid grid-cols-2 gap-4">
                        <button id="role-driver" onclick="selectRole('DRIVER')" class="py-6 border-2 border-slate-100 rounded-3xl font-black text-slate-400 bg-white transition-all">DRIVER</button>
                        <button id="role-outlet" onclick="selectRole('OUTLET')" class="py-6 border-2 border-slate-100 rounded-3xl font-black text-slate-400 bg-white transition-all">OUTLET</button>
                    </div>
                </div>
                <div class="space-y-4">
                    <input type="text" id="user-name" oninput="saveDraft()" placeholder="Full Name" class="w-full p-5 rounded-3xl border border-slate-100 outline-none focus:ring-4 focus:ring-sky-50 bg-white font-bold text-slate-800">
                    <select id="outlet-select" onchange="saveDraft()" class="w-full p-5 rounded-3xl border border-slate-100 bg-white outline-none font-bold text-slate-800 appearance-none"></select>
                    <input type="date" id="entry-date" oninput="saveDraft()" class="w-full p-5 rounded-3xl border border-slate-100 bg-white outline-none font-bold text-slate-800">
                </div>
                <button onclick="openPortal()" class="w-full ocean-gradient text-white font-black py-6 rounded-[2rem] shadow-2xl shadow-sky-900/20 uppercase tracking-widest text-sm active:scale-95 transition-all">Access Portal</button>
            </div>
        </section>

        <section id="step-2" class="hidden space-y-6 mt-4">
            <div class="flex items-center justify-between gap-4 p-2 bg-sky-900/5 rounded-3xl">
                <button onclick="goBack()" class="bg-white px-6 py-3 rounded-2xl shadow-sm text-sky-900 font-black text-[11px] flex items-center border border-sky-100 active:scale-90 transition-all uppercase">
                    <i class="fas fa-arrow-left mr-2"></i> Back
                </button>
                <span id="portal-display-title" class="text-sky-900 font-900 italic text-[11px] uppercase tracking-widest mr-4"></span>
            </div>
            <div id="photo-grid" class="space-y-6">
                <script>
                    for(let i=1; i<=12; i++) {
                        document.write(`
                            <div class="photo-card space-y-4">
                                <div class="flex justify-between items-center">
                                    <span class="text-[11px] font-black text-slate-400 uppercase tracking-widest">Evidence Slot ${i}</span>
                                    <div class="w-8 h-8 rounded-full bg-sky-50 flex items-center justify-center text-sky-400 text-xs"><i class="fas fa-camera"></i></div>
                                </div>
                                <div class="photo-upload-zone" onclick="triggerCamera(${i})">
                                    <div class="text-center" id="placeholder-${i}">
                                        <div class="text-3xl mb-1">📸</div>
                                        <div class="text-[9px] font-900 text-sky-500 uppercase tracking-widest">Capture Now</div>
                                    </div>
                                    <input type="file" id="cam-${i}" accept="image/*" capture="camera" class="hidden" onchange="previewPhoto(${i})">
                                    <div id="wrap-${i}"></div>
                                </div>
                                <textarea id="desc-${i}" oninput="saveDraft()" class="w-full p-5 rounded-2xl border border-slate-50 bg-slate-50 text-sm font-semibold text-slate-700 outline-none focus:ring-4 focus:ring-sky-100/50" placeholder="Note down report details..."></textarea>
                            </div>
                        `);
                    }
                </script>
            </div>
            <button id="submit-btn" disabled onclick="processAllPortals()" class="w-full bg-slate-900 text-white font-black py-7 rounded-[2.5rem] shadow-2xl uppercase tracking-[0.4em] mt-8 mb-16 active:scale-95 transition-all">Upload Final Report</button>
        </section>
    </main>

    <div class="fixed bottom-4 right-4 z-[1000]">
        <button onclick="promptAdmin()" class="bg-white/90 backdrop-blur-md p-4 rounded-full text-[10px] font-black text-sky-900 shadow-2xl uppercase border border-sky-100 active:scale-95 transition-all">
            <i class="fas fa-user-shield mr-2 text-sky-500"></i> Supervisor
        </button>
    </div>

    <script>
        const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbwy58cuAW4o6ZMuvH98TWoBwnSFfxppFG-eg6kbZvzM1I9fNYHlejK6WVFj79fZwY1r5w/exec';
        const outlets = ["AJ", "B6", "BB", "BJR", "BP", "CDR", "CK", "DG", "DGD", "GB", "GBD", "GM", "HL", "HQ", "HQCT", "JL", "JLD", "JTH", "KB", "KBKK", "KBKS", "KBTJ", "KKR", "KL", "KMD", "KMN", "KMSK", "KS", "MC", "MLR", "MR", "PC", "PK", "PM", "PP", "PPK", "PSPD", "PT", "RJ", "SLS", "SMR", "ST", "TM", "TMD", "TMT", "TPOH", "TPT", "WM"];
        let currentRole = "";

        const sel = document.getElementById('outlet-select');
        const adminSel = document.getElementById('filter-outlet');
        sel.innerHTML = outlets.map(o => `<option value="${o}">${o}</option>`).join('');
        adminSel.innerHTML = `<option value="ALL">All Outlets</option>` + outlets.map(o => `<option value="${o}">${o}</option>`).join('');
        
        document.getElementById('entry-date').valueAsDate = new Date();
        document.getElementById('filter-date').value = new Date().toISOString().slice(0, 7);

        // Core Functions
        window.onload = () => {
            const draft = JSON.parse(localStorage.getItem('ops_portal_draft'));
            if(draft) {
                document.getElementById('user-name').value = draft.user || "";
                document.getElementById('outlet-select').value = draft.outlet || "AJ";
                document.getElementById('entry-date').value = draft.date || new Date().toISOString().split('T')[0];
                if(draft.role) selectRole(draft.role);
                for(let i=1; i<=12; i++) {
                    if(draft.descriptions?.[i-1]) document.getElementById(`desc-${i}`).value = draft.descriptions[i-1];
                    const savedImg = localStorage.getItem(`photo_data_${i}`);
                    if(savedImg) displayStoredPhoto(i, savedImg, `${draft.user} - ${draft.outlet}`);
                }
                validateSubmit();
            }
        };

        function selectRole(role) {
            currentRole = role;
            document.getElementById('role-driver').className = role === 'DRIVER' ? 'py-6 border-2 border-sky-500 rounded-3xl font-black text-sky-600 bg-sky-50 shadow-inner' : 'py-6 border-2 border-slate-100 rounded-3xl font-black text-slate-400 bg-white';
            document.getElementById('role-outlet').className = role === 'OUTLET' ? 'py-6 border-2 border-sky-500 rounded-3xl font-black text-sky-600 bg-sky-50 shadow-inner' : 'py-6 border-2 border-slate-100 rounded-3xl font-black text-slate-400 bg-white';
            saveDraft();
        }

        function saveDraft() {
            const descs = [];
            for(let i=1; i<=12; i++) descs.push(document.getElementById(`desc-${i}`).value);
            const draft = { user: document.getElementById('user-name').value, role: currentRole, outlet: document.getElementById('outlet-select').value, date: document.getElementById('entry-date').value, descriptions: descs };
            localStorage.setItem('ops_portal_draft', JSON.stringify(draft));
        }

        function triggerCamera(id) { if (!localStorage.getItem(`photo_data_${id}`)) document.getElementById(`cam-${id}`).click(); }

        function previewPhoto(id) {
            const file = document.getElementById(`cam-${id}`).files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                localStorage.setItem(`photo_data_${id}`, e.target.result);
                displayStoredPhoto(id, e.target.result, `${document.getElementById('user-name').value} - ${document.getElementById('outlet-select').value}`);
                saveDraft();
                validateSubmit();
            }
            reader.readAsDataURL(file);
        }

        function displayStoredPhoto(id, base64, meta) {
            const wrap = document.getElementById(`wrap-${id}`);
            document.getElementById(`placeholder-${id}`).classList.add('hidden');
            wrap.innerHTML = `<button class="clear-btn" onclick="clearPhoto(${id}); event.stopPropagation();">Clear</button><img src="${base64}"><div class="timestamp-badge">${meta}</div>`;
        }

        function clearPhoto(id) {
            localStorage.removeItem(`photo_data_${id}`);
            document.getElementById(`wrap-${id}`).innerHTML = "";
            document.getElementById(`placeholder-${id}`).classList.remove('hidden');
            saveDraft();
            validateSubmit();
        }

        function validateSubmit() {
            let count = 0;
            for(let i=1; i<=12; i++) if(localStorage.getItem(`photo_data_${i}`)) count++;
            document.getElementById('submit-btn').disabled = count < 1;
            document.getElementById('submit-btn').classList.toggle('bg-sky-500', count >= 1);
            document.getElementById('submit-btn').classList.toggle('bg-slate-900', count < 1);
        }

        function openPortal() { 
            if(!document.getElementById('user-name').value || !currentRole) return alert("Fill Name and Role.");
            document.getElementById('step-1').classList.add('hidden'); 
            document.getElementById('step-2').classList.remove('hidden'); 
            document.getElementById('portal-display-title').innerText = currentRole + " Workspace"; 
        }

        function goBack() { document.getElementById('step-2').classList.add('hidden'); document.getElementById('step-1').classList.remove('hidden'); }

        function clearAllAndReload() { localStorage.removeItem('ops_portal_draft'); location.reload(); }

        async function compressImage(base64) {
            return new Promise((resolve) => {
                const img = new Image();
                img.src = base64;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    let width = img.width, height = img.height, max = 800; 
                    if (width > height && width > max) { height *= max / width; width = max; }
                    else if (height > max) { width *= max / height; height = max; }
                    canvas.width = width; canvas.height = height;
                    ctx.drawImage(img, 0, 0, width, height);
                    const stamp = `${document.getElementById('user-name').value} | ${new Date().toLocaleString()}`;
                    ctx.fillStyle = "rgba(0, 0, 0, 0.65)";
                    ctx.fillRect(0, height - 40, width, 40); 
                    ctx.fillStyle = "white"; ctx.font = "bold 16px Arial";
                    ctx.fillText(stamp, 20, height - 15);
                    resolve(canvas.toDataURL('image/jpeg', 0.45));
                };
            });
        }

        async function processAllPortals() {
            const overlay = document.getElementById('loading-overlay');
            overlay.style.display = 'flex';
            const activeIds = [];
            for (let i = 1; i <= 12; i++) if (localStorage.getItem(`photo_data_${i}`)) activeIds.push(i); 

            try {
                const photos = [];
                for(let id of activeIds) {
                    const clean = await compressImage(localStorage.getItem(`photo_data_${id}`));
                    photos.push({ base64: clean, description: document.getElementById(`desc-${id}`).value || "Observation Point" });
                }

                const payload = { 
                    user: document.getElementById('user-name').value, 
                    role: currentRole, 
                    outlet: document.getElementById('outlet-select').value, 
                    date: document.getElementById('entry-date').value, 
                    photos: photos 
                };

                let history = JSON.parse(localStorage.getItem('ops_history')) || [];
                history.push([new Date().toISOString(), payload.user, payload.outlet, payload.date, payload.role, photos]);
                localStorage.setItem('ops_history', JSON.stringify(history));

                await fetch(WEB_APP_URL, { method: 'POST', body: JSON.stringify(payload), mode: 'no-cors' });

                setTimeout(() => {
                    overlay.style.display = 'none';
                    document.getElementById('success-overlay').style.display = 'flex';
                }, 3000);

            } catch (e) { alert("Network Busy."); overlay.style.display = 'none'; }
        }

        /* SUPERVISOR DASHBOARD V2.9.1 */

        async function downloadIndividualPDF(role, rowId) {
            const overlay = document.getElementById('loading-overlay');
            overlay.style.display = 'flex';
            document.getElementById('loading-text').innerText = "Generating PDF...";
            
            try {
                const url = `${WEB_APP_URL}?action=generatePDF&role=${role}&row=${rowId}`;
                const resp = await fetch(url);
                const result = await resp.json();
                
                if (result.data) {
                    // BLOB RE-ASSEMBLY (Prevents Jumbled Words)
                    const byteChars = atob(result.data);
                    const byteArrays = [];
                    for (let offset = 0; offset < byteChars.length; offset += 512) {
                        const slice = byteChars.slice(offset, offset + 512);
                        const byteNums = new Array(slice.length);
                        for (let i = 0; i < slice.length; i++) byteNums[i] = slice.charCodeAt(i);
                        byteArrays.push(new Uint8Array(byteNums));
                    }
                    const blob = new Blob(byteArrays, {type: 'application/pdf'});
                    const link = document.createElement('a');
                    link.href = window.URL.createObjectURL(blob);
                    link.download = `Report_${role}_#${rowId}.pdf`;
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                } else { throw new Error(); }
            } catch (e) {
                window.open(`${WEB_APP_URL}?action=getReport&role=${role}&row=${rowId}`, '_blank');
            } finally { overlay.style.display = 'none'; }
        }

        function downloadBulk() {
            const checked = Array.from(document.querySelectorAll('.report-checkbox:checked'));
            if(checked.length === 0) return alert("Check items first.");
            const ids = checked.map(c => c.value).join(',');
            window.open(`${WEB_APP_URL}?action=combinedPDF&ids=${ids}`, '_blank');
        }

        function renderAdminLogs() {
            const history = JSON.parse(localStorage.getItem('ops_history')) || [];
            const container = document.getElementById('admin-log-container');
            container.innerHTML = "";
            const roleFilter = document.getElementById('filter-role').value;
            const outletFilter = document.getElementById('filter-outlet').value;
            const dateFilter = document.getElementById('filter-date').value;

            // STABLE FILTERING (AND LOGIC)
            const filtered = history.filter(row => {
                const matchRole = roleFilter === "ALL" || row[4].toUpperCase() === roleFilter.toUpperCase(); 
                const matchOutlet = outletFilter === "ALL" || row[2] === outletFilter;
                const matchDate = !dateFilter || row[0].toString().startsWith(dateFilter);
                return matchRole && matchOutlet && matchDate;
            });

            if(filtered.length === 0) {
                container.innerHTML = `<div class="text-center py-24 opacity-20 font-black text-xs uppercase tracking-widest">No Matches Found</div>`;
                return;
            }

            filtered.reverse().forEach((row, index) => {
                const realRowIdx = filtered.length - index;
                const photos = row[5] || [];
                const card = document.createElement('div');
                card.className = "bg-white p-6 rounded-[2.5rem] border border-slate-200 shadow-sm relative";
                
                let sliderHtml = photos.length > 0 ? `
                    <div class="admin-slider mt-4">
                        ${photos.map(p => `
                            <div class="slider-item">
                                <img src="${p.base64}">
                                <div class="slider-desc">${p.description}</div>
                            </div>
                        `).join('')}
                    </div>
                ` : `<div class="text-center text-[10px] font-bold text-slate-300 py-8 italic uppercase tracking-widest">Empty Content</div>`;

                card.innerHTML = `
                    <div class="flex justify-between items-start">
                        <div class="flex items-center gap-4">
                            <input type="checkbox" value="${realRowIdx}|${row[4]}" class="report-checkbox w-6 h-6 rounded-xl border-slate-300 accent-sky-900">
                            <div>
                                <h4 class="font-black text-[13px] uppercase text-slate-800 tracking-tighter">${row[1]}</h4>
                                <p class="text-[9px] font-black text-sky-500 uppercase tracking-widest mt-1">${row[2]} • ${row[4]}</p>
                            </div>
                        </div>
                        <div class="flex flex-col items-end">
                            <span class="bg-emerald-50 text-emerald-600 text-[9px] font-black px-3 py-1 rounded-full">SYNCED</span>
                            <p class="text-[8px] text-slate-300 mt-2">${new Date(row[0]).toLocaleDateString()}</p>
                        </div>
                    </div>
                    ${sliderHtml}
                    <div class="grid grid-cols-2 gap-3 mt-6 pt-5 border-t border-slate-50">
                        <button onclick="window.open('${WEB_APP_URL}?action=getReport&role=${row[4]}&row=${realRowIdx}', '_blank')" class="py-4 bg-slate-50 text-slate-500 rounded-2xl text-[10px] font-black uppercase"><i class="fas fa-eye mr-2"></i> Browser View</button>
                        <button onclick="downloadIndividualPDF('${row[4]}', ${realRowIdx})" class="py-4 bg-sky-100 text-sky-900 rounded-2xl text-[10px] font-black uppercase"><i class="fas fa-file-pdf mr-2"></i> Download PDF</button>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function promptAdmin() {
            if(prompt("Security PIN:") === "admin") { 
                document.getElementById('admin-overlay').style.display = 'flex'; 
                renderAdminLogs(); 
            } else alert("Invalid PIN.");
        }
        function closeAdmin() { document.getElementById('admin-overlay').style.display = 'none'; }
    </script>
</body>
</html>
