<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>OPS PORTAL V2.6</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --ocean: #075985; --aqua: #2dd4bf; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f0f9ff; -webkit-tap-highlight-color: transparent; padding-bottom: env(safe-area-inset-bottom); }
        .ocean-gradient { background: linear-gradient(135deg, #075985 0%, #0c4a6e 100%); }
        .glass-card { background: rgba(255, 255, 255, 0.98); backdrop-filter: blur(10px); border: 1px solid #bae6fd; }
        .photo-card { background: #ffffff; border: 1px solid #e0f2fe; border-radius: 20px; padding: 15px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05); }
        .photo-upload-zone { width: 100%; height: 220px; border: 2px dashed #7dd3fc; border-radius: 16px; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; overflow: hidden; background: #f8fafc; cursor: pointer; }
        .photo-upload-zone img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 10; }
        .timestamp-badge { position: absolute; bottom: 0; left: 0; width: 100%; background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, transparent 100%); color: white; font-size: 9px; padding: 20px 12px 8px 12px; z-index: 20; line-height: 1.3; pointer-events: none; }
        #success-overlay, #admin-overlay, #loading-overlay { display: none; position: fixed; inset: 0; background: white; z-index: 1000; flex-direction: column; align-items: center; justify-content: center; overflow-y: auto; }
        #loading-overlay { background: rgba(7, 89, 133, 0.98); backdrop-filter: blur(10px); color: white; }
        .spinner { width: 50px; height: 50px; border: 5px solid rgba(255,255,255,0.2); border-radius: 50%; border-top-color: var(--aqua); animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        /* SUPERVISOR IMAGE SLIDER */
        .admin-slider { display: flex; overflow-x: auto; gap: 12px; padding: 10px 0; scroll-snap-type: x mandatory; -webkit-overflow-scrolling: touch; }
        .admin-slider::-webkit-scrollbar { height: 4px; }
        .admin-slider::-webkit-scrollbar-thumb { background: #bae6fd; border-radius: 10px; }
        .slider-item { flex: 0 0 80%; scroll-snap-align: center; background: #f8fafc; border-radius: 15px; border: 1px solid #e0f2fe; overflow: hidden; }
        .slider-item img { width: 100%; height: 160px; object-fit: cover; background: #eee; }
        .slider-desc { padding: 10px; font-size: 10px; color: #0369a1; font-weight: 700; line-height: 1.4; min-height: 40px; }
    </style>
</head>
<body>

    <div id="loading-overlay">
        <div id="loading-spinner" class="spinner"></div>
        <h2 id="loading-text" class="text-lg font-bold uppercase tracking-widest text-center px-6">Uploading Report...</h2>
        <p id="loading-subtext" class="text-xs mt-2 opacity-70">Securing data to Cloud Storage...</p>
    </div>

    <div id="success-overlay">
        <div class="text-emerald-500 text-6xl mb-4">✔</div>
        <h2 class="text-2xl font-800 text-sky-900 uppercase tracking-widest">Success</h2>
        <button onclick="clearAllAndReload()" class="mt-8 px-10 py-3 bg-cyan-600 text-white rounded-full font-bold shadow-lg">New Entry</button>
    </div>

    <div id="admin-overlay" class="p-6">
        <div class="w-full max-w-lg mx-auto">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-800 text-sky-900 uppercase tracking-tighter">Supervisor Feed</h2>
                <button onclick="closeAdmin()" class="bg-red-50 text-red-500 px-4 py-2 rounded-xl text-xs font-bold uppercase">Exit</button>
            </div>
            
            <div class="bg-white p-5 rounded-[2rem] border border-sky-100 shadow-sm mb-6 space-y-3">
                <div class="grid grid-cols-2 gap-2">
                    <select id="filter-role" onchange="renderAdminLogs()" class="p-3 rounded-xl border border-sky-50 text-xs font-bold bg-slate-50">
                        <option value="ALL">All Portals</option>
                        <option value="DRIVER">Driver</option>
                        <option value="OUTLET">Outlet</option>
                    </select>
                    <select id="filter-outlet" onchange="renderAdminLogs()" class="p-3 rounded-xl border border-sky-50 text-xs font-bold bg-slate-50"></select>
                </div>
                <input type="month" id="filter-date" onchange="renderAdminLogs()" class="w-full p-3 rounded-xl border border-sky-50 text-xs font-bold bg-slate-50">
                <button onclick="downloadBulk()" class="w-full bg-blue-600 text-white py-4 rounded-2xl text-xs font-black uppercase tracking-widest shadow-md active:scale-95 transition-all">
                    <i class="fas fa-file-pdf mr-2"></i> Download Combined PDF
                </button>
            </div>

            <div id="admin-log-container" class="space-y-6 pb-20"></div>
        </div>
    </div>

    <header class="ocean-gradient text-white pt-16 pb-24 px-8 rounded-b-[45px] shadow-2xl relative z-0">
        <div class="absolute top-6 right-8 text-[10px] font-bold text-sky-300 opacity-60">V2.6</div>
        <div class="flex flex-col items-center text-center">
            <h1 class="text-3xl font-900 tracking-tighter">OPS PORTAL</h1>
            <p class="text-sky-200 text-[10px] font-bold tracking-[0.2em] opacity-80 uppercase mt-1">Operational Reporting System</p>
        </div>
    </header>

    <main class="px-5 -mt-16 pb-20 relative z-10">
        <section id="step-1" class="glass-card rounded-[35px] p-7 shadow-2xl">
            <div class="space-y-6">
                <div>
                    <label class="text-[11px] font-800 text-sky-900 uppercase mb-3 block tracking-widest ml-1">Identity & Role</label>
                    <div class="grid grid-cols-2 gap-4">
                        <button id="role-driver" onclick="selectRole('DRIVER')" class="py-5 border-2 border-sky-100 rounded-2xl font-bold text-sky-400 bg-white active:scale-95 transition-all">DRIVER</button>
                        <button id="role-outlet" onclick="selectRole('OUTLET')" class="py-5 border-2 border-sky-100 rounded-2xl font-bold text-sky-400 bg-white active:scale-95 transition-all">OUTLET</button>
                    </div>
                </div>
                <div class="space-y-4">
                    <input type="text" id="user-name" oninput="saveDraft()" placeholder="Full Name" class="w-full p-5 rounded-2xl border border-sky-100 outline-none focus:ring-2 focus:ring-cyan-400 bg-white font-semibold text-sky-900 shadow-sm">
                    <select id="outlet-select" onchange="saveDraft()" class="w-full p-5 rounded-2xl border border-sky-100 bg-white outline-none font-semibold text-sky-900 appearance-none shadow-sm"></select>
                    <input type="date" id="entry-date" oninput="saveDraft()" class="w-full p-5 rounded-2xl border border-sky-100 bg-white outline-none font-semibold text-sky-900 shadow-sm">
                </div>
                <button onclick="openPortal()" class="w-full bg-cyan-500 text-white font-black py-5 rounded-2xl shadow-xl shadow-cyan-100 uppercase tracking-widest text-sm hover:bg-cyan-600 active:scale-95 transition-all">Access Portal</button>
            </div>
        </section>

        <section id="step-2" class="hidden space-y-6">
            <div class="flex items-center gap-3">
                <button onclick="goBack()" class="bg-white px-5 py-3 rounded-2xl shadow-md text-sky-800 font-bold text-[11px] flex items-center border border-sky-100 active:scale-90 transition-all uppercase whitespace-nowrap">
                    <span class="mr-2 text-base">⇠</span> BACK
                </button>
                <div class="flex-1 bg-sky-800/10 h-[2px] rounded-full"></div>
                <span id="portal-display-title" class="text-sky-900 font-800 italic text-xs uppercase tracking-tighter"></span>
            </div>
            <div id="photo-grid" class="space-y-6">
                <script>
                    for(let i=1; i<=12; i++) {
                        document.write(`
                            <div class="photo-card space-y-4">
                                <div class="flex justify-between items-center px-1">
                                    <span class="text-[10px] font-black text-sky-300 uppercase tracking-widest">Evidence Slot ${i}</span>
                                    <i class="fas fa-camera text-sky-100"></i>
                                </div>
                                <div class="photo-upload-zone" onclick="triggerCamera(${i})">
                                    <div class="text-center" id="placeholder-${i}"><div class="text-3xl mb-2">📸</div><div class="text-[10px] font-800 text-cyan-500 uppercase">Snap Capture</div></div>
                                    <input type="file" id="cam-${i}" accept="image/*" capture="camera" class="hidden" onchange="previewPhoto(${i})">
                                    <div id="wrap-${i}"></div>
                                </div>
                                <textarea id="desc-${i}" oninput="saveDraft()" class="w-full p-4 rounded-xl border border-sky-50 bg-slate-50 text-sm font-medium text-sky-800 outline-none focus:ring-2 focus:ring-cyan-400" placeholder="Details..."></textarea>
                            </div>
                        `);
                    }
                </script>
            </div>
            <button id="submit-btn" disabled onclick="processAllPortals()" class="w-full bg-slate-800 text-white font-black py-6 rounded-3xl shadow-2xl uppercase tracking-[0.3em] mt-8 mb-10 transition-all">Submit Report</button>
        </section>
    </main>

    <div class="fixed bottom-4 right-4 z-[50]">
        <button onclick="promptAdmin()" class="bg-white/50 backdrop-blur p-3 rounded-full text-[9px] font-black text-sky-900 shadow-lg uppercase border border-sky-100"><i class="fas fa-user-shield mr-1"></i> Admin</button>
    </div>

    <script>
        const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbwy58cuAW4o6ZMuvH98TWoBwnSFfxppFG-eg6kbZvzM1I9fNYHlejK6WVFj79fZwY1r5w/exec';
        const outlets = ["AJ", "B6", "BB", "BJR", "BP", "CDR", "CK", "DG", "DGD", "GB", "GBD", "GM", "HL", "HQ", "HQCT", "JL", "JLD", "JTH", "KB", "KBKK", "KBKS", "KBTJ", "KKR", "KL", "KMD", "KMN", "KMSK", "KS", "MC", "MLR", "MR", "PC", "PK", "PM", "PP", "PPK", "PSPD", "PT", "RJ", "SLS", "SMR", "ST", "TM", "TMD", "TMT", "TPOH", "TPT", "WM"];
        let currentRole = "";

        const sel = document.getElementById('outlet-select');
        const adminSel = document.getElementById('filter-outlet');
        sel.innerHTML = outlets.map(o => `<option value="${o}">${o}</option>`).join('');
        adminSel.innerHTML = `<option value="ALL">All Outlets</option>` + outlets.map(o => `<option value="${o}">${o}</option>`).join('');
        
        document.getElementById('entry-date').valueAsDate = new Date();
        document.getElementById('filter-date').value = new Date().toISOString().slice(0, 7);

        window.onload = () => {
            const draft = JSON.parse(localStorage.getItem('ops_portal_draft'));
            if(draft) {
                document.getElementById('user-name').value = draft.user || "";
                document.getElementById('outlet-select').value = draft.outlet || "AJ";
                document.getElementById('entry-date').value = draft.date || new Date().toISOString().split('T')[0];
                if(draft.role) selectRole(draft.role);
                for(let i=1; i<=12; i++) {
                    const savedDesc = draft.descriptions?.[i-1];
                    if(savedDesc) document.getElementById(`desc-${i}`).value = savedDesc;
                    const savedImg = localStorage.getItem(`photo_data_${i}`);
                    if(savedImg) displayStoredPhoto(i, savedImg, draft.photo_meta?.[i-1]);
                }
                validateSubmit();
            }
        };

        function selectRole(role) {
            currentRole = role;
            document.getElementById('role-driver').className = role === 'DRIVER' ? 'py-5 border-2 border-cyan-500 rounded-2xl font-black text-cyan-600 bg-cyan-50 shadow-inner' : 'py-5 border-2 border-sky-100 rounded-2xl font-bold text-sky-400 bg-white';
            document.getElementById('role-outlet').className = role === 'OUTLET' ? 'py-5 border-2 border-cyan-500 rounded-2xl font-black text-cyan-600 bg-cyan-50 shadow-inner' : 'py-5 border-2 border-sky-100 rounded-2xl font-bold text-sky-400 bg-white';
            saveDraft();
        }

        function saveDraft() {
            const descs = [];
            for(let i=1; i<=12; i++) descs.push(document.getElementById(`desc-${i}`).value);
            const draft = { user: document.getElementById('user-name').value, role: currentRole, outlet: document.getElementById('outlet-select').value, date: document.getElementById('entry-date').value, descriptions: descs };
            localStorage.setItem('ops_portal_draft', JSON.stringify(draft));
        }

        function triggerCamera(id) { if (!localStorage.getItem(`photo_data_${id}`)) document.getElementById(`cam-${id}`).click(); }

        function previewPhoto(id) {
            const file = document.getElementById(`cam-${id}`).files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                const now = new Date();
                const meta = `${document.getElementById('user-name').value} - ${document.getElementById('outlet-select').value}\n${now.toLocaleDateString('en-GB')} | ${now.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}`;
                localStorage.setItem(`photo_data_${id}`, e.target.result);
                displayStoredPhoto(id, e.target.result, meta);
                saveDraft();
                validateSubmit();
            }
            reader.readAsDataURL(file);
        }

        function displayStoredPhoto(id, base64, meta) {
            const wrap = document.getElementById(`wrap-${id}`);
            document.getElementById(`placeholder-${id}`).classList.add('hidden');
            wrap.innerHTML = `<button class="clear-btn" onclick="clearPhoto(${id}); event.stopPropagation();">Clear</button><img src="${base64}"><div class="timestamp-badge">${meta.replace(/\n/g, '<br>')}</div>`;
        }

        function clearPhoto(id) {
            localStorage.removeItem(`photo_data_${id}`);
            document.getElementById(`wrap-${id}`).innerHTML = "";
            document.getElementById(`placeholder-${id}`).classList.remove('hidden');
            saveDraft();
            validateSubmit();
        }

        function validateSubmit() {
            let count = 0;
            for(let i=1; i<=12; i++) if(localStorage.getItem(`photo_data_${i}`)) count++;
            const btn = document.getElementById('submit-btn');
            btn.disabled = count < 1;
            btn.classList.toggle('bg-cyan-600', count >= 1);
        }

        function openPortal() { 
            if(!document.getElementById('user-name').value || !currentRole) return alert("Please fill info.");
            document.getElementById('step-1').style.display = 'none'; 
            document.getElementById('step-2').classList.remove('hidden'); 
            document.getElementById('portal-display-title').innerText = currentRole + " MODE"; 
        }
        function goBack() { document.getElementById('step-2').classList.add('hidden'); document.getElementById('step-1').style.display = 'block'; }
        function clearAllAndReload() { localStorage.removeItem('ops_portal_draft'); for(let i=1; i<=12; i++) localStorage.removeItem(`photo_data_${i}`); location.reload(); }

        async function compressImage(base64) {
            return new Promise((resolve) => {
                const img = new Image();
                img.src = base64;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    let width = img.width, height = img.height, max = 800; 
                    if (width > height && width > max) { height *= max / width; width = max; }
                    else if (height > max) { width *= max / height; height = max; }
                    canvas.width = width; canvas.height = height;
                    ctx.drawImage(img, 0, 0, width, height);
                    const stamp = `${document.getElementById('user-name').value} - ${new Date().toLocaleString()}`;
                    ctx.fillStyle = "rgba(0, 0, 0, 0.6)";
                    ctx.fillRect(0, height - 40, width, 40); 
                    ctx.fillStyle = "white"; ctx.font = "bold 15px Arial";
                    ctx.fillText(stamp, 15, height - 15);
                    resolve(canvas.toDataURL('image/jpeg', 0.4));
                };
            });
        }

        async function processAllPortals() {
            const overlay = document.getElementById('loading-overlay');
            overlay.style.display = 'flex';
            const activeIds = [];
            for (let i = 1; i <= 12; i++) if (localStorage.getItem(`photo_data_${i}`)) activeIds.push(i); 

            try {
                const photos = [];
                for(let id of activeIds) {
                    const clean = await compressImage(localStorage.getItem(`photo_data_${id}`));
                    photos.push({ base64: clean, description: document.getElementById(`desc-${id}`).value || "No details provided" });
                }

                const payload = { 
                    user: document.getElementById('user-name').value, 
                    role: currentRole, 
                    outlet: document.getElementById('outlet-select').value, 
                    date: document.getElementById('entry-date').value, 
                    photos: photos 
                };

                // CRITICAL: Cache images locally for supervisor horizontal slider view
                let history = JSON.parse(localStorage.getItem('ops_history')) || [];
                history.push([new Date().toISOString(), payload.user, payload.outlet, payload.date, payload.role, photos]);
                localStorage.setItem('ops_history', JSON.stringify(history));

                await fetch(WEB_APP_URL, { method: 'POST', body: JSON.stringify(payload), mode: 'no-cors' });

                setTimeout(() => {
                    overlay.style.display = 'none';
                    document.getElementById('success-overlay').style.display = 'flex';
                }, 3000);

            } catch (e) {
                alert("Upload Interrupted");
                overlay.style.display = 'none';
            }
        }

        /** SUPERVISOR MODE V2.6 REVAMP **/
        
        async function downloadIndividualPDF(role, rowId) {
            // FIX: Use Blob Handwriting to force browser to DOWNLOAD instead of rendering Base64 text
            try {
                const url = `${WEB_APP_URL}?action=generatePDF&role=${role}&row=${rowId}`;
                const resp = await fetch(url);
                const result = await resp.json();
                
                if (result.data) {
                    const byteChars = atob(result.data);
                    const byteNums = new Array(byteChars.length);
                    for (let i = 0; i < byteChars.length; i++) byteNums[i] = byteChars.charCodeAt(i);
                    const byteArray = new Uint8Array(byteNums);
                    const blob = new Blob([byteArray], {type: 'application/pdf'});
                    
                    const link = document.createElement('a');
                    link.href = window.URL.createObjectURL(blob);
                    link.download = `Report_${role}_Row${rowId}.pdf`;
                    link.click();
                } else { throw new Error(); }
            } catch (e) {
                // Fallback to direct window open if blob fails
                window.open(`${WEB_APP_URL}?action=generatePDF&role=${role}&row=${rowId}`, '_blank');
            }
        }

        function downloadBulk() {
            const checked = Array.from(document.querySelectorAll('.report-checkbox:checked'));
            if(checked.length === 0) return alert("Select reports first.");
            const ids = checked.map(c => c.value).join(',');
            window.open(`${WEB_APP_URL}?action=combinedPDF&ids=${ids}`, '_blank');
        }

        function renderAdminLogs() {
            const history = JSON.parse(localStorage.getItem('ops_history')) || [];
            const container = document.getElementById('admin-log-container');
            container.innerHTML = "";
            const roleFilter = document.getElementById('filter-role').value;
            const outletFilter = document.getElementById('filter-outlet').value;
            const dateFilter = document.getElementById('filter-date').value;

            const filtered = history.filter(row => {
                const matchesRole = roleFilter === "ALL" || row[4] === roleFilter; 
                const matchesOutlet = outletFilter === "ALL" || row[2] === outletFilter;
                const matchesDate = !dateFilter || row[0].toString().startsWith(dateFilter);
                return matchesOutlet && matchesDate;
            });

            if(filtered.length === 0) {
                container.innerHTML = `<div class="text-center py-10 opacity-30 font-black text-[10px]">NO RECORDS FOUND</div>`;
                return;
            }

            filtered.reverse().forEach((row, index) => {
                const realIndex = filtered.length - index;
                const photos = row[5] || [];
                
                const card = document.createElement('div');
                card.className = "bg-white p-5 rounded-[2.5rem] border border-sky-100 shadow-sm relative";
                
                // NEW: Horizontal Image Slider Logic
                let sliderHtml = photos.length > 0 ? `
                    <div class="admin-slider mt-4">
                        ${photos.map(p => `
                            <div class="slider-item">
                                <img src="${p.base64}">
                                <div class="slider-desc">${p.description}</div>
                            </div>
                        `).join('')}
                    </div>
                ` : `<div class="text-center text-[10px] font-bold text-slate-300 py-6">No images submitted</div>`;

                card.innerHTML = `
                    <div class="flex justify-between items-start">
                        <div class="flex items-center gap-3">
                            <input type="checkbox" value="${realIndex}|${row[4]}" class="report-checkbox w-6 h-6 rounded-xl border-sky-100">
                            <div>
                                <h4 class="font-black text-[12px] uppercase text-sky-900">${row[1]}</h4>
                                <p class="text-[9px] font-bold text-sky-300 uppercase tracking-widest">${row[2]} | ${row[4]} MODE</p>
                            </div>
                        </div>
                        <span class="bg-emerald-50 text-emerald-600 text-[8px] font-black px-2 py-1 rounded-lg">SYNCED</span>
                    </div>
                    ${sliderHtml}
                    <div class="grid grid-cols-2 gap-2 mt-4 pt-4 border-t border-slate-50">
                        <button onclick="window.open('${WEB_APP_URL}?action=getReport&role=${row[4]}&row=${realIndex}', '_blank')" class="py-3 bg-slate-50 text-slate-500 rounded-xl text-[9px] font-black uppercase"><i class="fas fa-external-link-alt mr-1"></i> Cloud View</button>
                        <button onclick="downloadIndividualPDF('${row[4]}', ${realIndex})" class="py-3 bg-blue-50 text-blue-600 rounded-xl text-[9px] font-black uppercase"><i class="fas fa-download mr-1"></i> PDF Report</button>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function promptAdmin() {
            if(prompt("Enter Supervisor PIN:") === "admin") { 
                document.getElementById('admin-overlay').style.display = 'flex'; renderAdminLogs(); 
            } else alert("Unauthorized.");
        }
        function closeAdmin() { document.getElementById('admin-overlay').style.display = 'none'; }
    </script>
</body>
</html>
